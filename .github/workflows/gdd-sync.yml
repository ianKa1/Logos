name: GDD Sync

on:
  schedule:
    # Daily at 03:00 UTC — adjust to taste
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Restructure even if the draft is unchanged'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: gdd-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DRAFT_PAGE_ID: ${{ secrets.NOTION_DRAFT_PAGE_ID }}
          NOTION_GDD_PAGE_ID: ${{ secrets.NOTION_GDD_PAGE_ID }}
          NOTION_PRINCIPLES_PAGE_ID: ${{ secrets.NOTION_PRINCIPLES_PAGE_ID }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: node scripts/sync.mjs ${{ inputs.force == true && '--force' || '' }}

      - name: Commit snapshots
        run: |
          git config user.name "gdd-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "chore: update GDD snapshot"
          git push
