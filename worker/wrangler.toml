name = "gdd-sync-trigger"
main = "worker.js"
compatibility_date = "2026-07-01"

[vars]
# Set to your GitHub repo, e.g. "yourname/card_GDD"
GITHUB_REPO = "OWNER/card_GDD"

# Secrets (set via `npx wrangler secret put <NAME>`, never committed):
#   GITHUB_TOKEN — fine-grained PAT with Contents read/write on this repo
#   TRIGGER_KEY  — random string gating the sync link (e.g. `openssl rand -hex 16`)
